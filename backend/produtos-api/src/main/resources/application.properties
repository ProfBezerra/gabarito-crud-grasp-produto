spring.application.name=produtos-api

# Porta dinâmica (Railway usa a variável $PORT)
server.port=${PORT:8080}

# H2 Database
spring.datasource.url=jdbc:h2:mem:produtosdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Console H2
spring.h2.console.enabled=true

# Log em arquivo (mantem log no console e grava em disco)
logging.file.name=logs/produtos-api.log
logging.level.root=INFO

# Rotacao basica de log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=14
logging.logback.rollingpolicy.total-size-cap=200MB
