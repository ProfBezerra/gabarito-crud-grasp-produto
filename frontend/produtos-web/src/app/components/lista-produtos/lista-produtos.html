<div class="d-flex justify-content-between align-items-center mb-3">
  <h2>Produtos</h2>
  <a routerLink="/produtos/novo" class="btn btn-primary">+ Cadastrar novo produto</a>
</div>

<div *ngIf="mensagem" class="alert alert-info">{{ mensagem }}</div>

<table class="table table-striped table-bordered">
  <thead class="table-dark">
    <tr>
      <th>Nome</th>
      <th>Preço</th>
      <th>Tipo</th>
      <th>Ações</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let produto of produtos">

      <!-- Modo leitura -->
      <td *ngIf="editandoId !== produto.id">{{ produto.nome }}</td>
      <td *ngIf="editandoId !== produto.id">R$ {{ produto.preco }}</td>
      <td *ngIf="editandoId !== produto.id">{{ produto.tipoNome }}</td>

      <!-- Modo edição inline -->
      <td *ngIf="editandoId === produto.id">
        <input type="text" [(ngModel)]="editandoNome" name="editandoNome" class="form-control form-control-sm">
      </td>
      <td *ngIf="editandoId === produto.id">
        <input type="number" [(ngModel)]="editandoPreco" name="editandoPreco" class="form-control form-control-sm">
      </td>
      <td *ngIf="editandoId === produto.id">
        <select [(ngModel)]="editandoTipoId" name="editandoTipoId" class="form-select form-select-sm">
          <option *ngFor="let tipo of tipos" [value]="tipo.id">{{ tipo.nome }}</option>
        </select>
      </td>

      <!-- Botões -->
      <td>
        <ng-container *ngIf="editandoId !== produto.id">
          <button class="btn btn-warning btn-sm me-1" (click)="iniciarEdicao(produto)">Editar</button>
          <button class="btn btn-danger btn-sm" (click)="deletar(produto.id)">Excluir</button>
        </ng-container>
        <ng-container *ngIf="editandoId === produto.id">
          <button class="btn btn-success btn-sm me-1" (click)="salvarEdicao()">Salvar</button>
          <button class="btn btn-secondary btn-sm" (click)="cancelarEdicao()">Cancelar</button>
        </ng-container>
      </td>
    </tr>
  </tbody>
</table>
