<h2>Produtos</h2>
<table border="1">
  <tr>
    <th>Nome </th>
    <th>Preco</th>
    <th>Tipo</th>
    <th>Acao</th>
  </tr>
  <tr *ngFor="let produto of produtos">
    <td>{{ produto.nome }}</td>
    <td>R$ {{ produto.preco }}</td>
    <td>{{ produto.tipoNome }}</td>
    <td>
      <button (click)="deletar(produto.id)">Deletar</button>
    </td>
  </tr>
</table>
